<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏇 ABSTRACT DERBY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070A12;
  --dark:#0b1020;
  --dark2:#0d1427;
  --dark3:#0a0f1d;
  --gold:#FFD700;
  --gold2:#ffb800;
  --green:#00e87a;
  --red:#ff2d55;
  --cyan:#00b4ff;
  --shadow:0 10px 30px rgba(0,0,0,0.6);
}
body{background:var(--dark);font-family:'Barlow Condensed',sans-serif;overflow:hidden;user-select:none;height:100vh;display:flex;flex-direction:column;}

/* Mobile fit-to-screen (iOS landscape) */
#fitRoot{transform-origin:top left;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}

/* Mobile: require landscape for playable layout */
#rotMsg{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.92);backdrop-filter:blur(10px);padding:18px;text-align:center;}
#rotMsg .card{max-width:520px;width:100%;background:rgba(10,15,30,.92);border:1px solid rgba(255,215,0,.25);
  border-radius:18px;padding:18px 16px;box-shadow:0 20px 60px rgba(0,0,0,.75);}
#rotMsg .t{font-family:'Orbitron',sans-serif;letter-spacing:2px;font-weight:900;color:var(--gold);font-size:14px;}
#rotMsg .b{margin-top:10px;color:rgba(255,255,255,.75);font-size:16px;line-height:1.4;}
#rotMsg .ic{font-size:46px;margin-top:12px;opacity:.9;}

@media (max-width: 900px) and (orientation: portrait){
  #rotMsg{display:flex;}
}

@media (max-width: 680px){
  #hdr{padding:10px 12px 10px 12px;gap:8px;flex-wrap:wrap;}
  .logo{font-size:28px;letter-spacing:3px;}
  .hdrMid{order:3;min-width:100%;max-width:100%;}
  #midBanner{height:40px;}
  .mp{padding:4px 10px;max-width:180px;}
  .mpn{max-width:90px;font-size:10px;letter-spacing:1.6px;}
  .sv{font-size:18px;}
  #scene{min-height:320px;}
}

@media (max-width: 420px){
  .logo{font-size:24px;}
  .stats-row{gap:8px;flex-wrap:wrap;justify-content:center;}
  .sbox{padding:4px 8px;}
}

:root{--trackBottom:3%;--trackHeight:50%;}

/* HEADER */
#hdr{background:linear-gradient(135deg,#070B14,#0b1224);border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 84px 12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:nowrap;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 25px rgba(255,215,0,0.35);display:flex;align-items:center;gap:10px;}
.logo .lico{font-size:28px;filter:drop-shadow(0 0 12px rgba(255,215,0,0.35));}
.alogo{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(255,215,0,0.25));}
.mBtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.86);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:7px 10px;border-radius:12px;cursor:pointer;white-space:nowrap;}
.mBtn:hover{border-color:rgba(255,215,0,0.55);color:var(--gold);}
.mOv{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);backdrop-filter:blur(10px);padding:16px;}
.mOv.on{display:flex;}
.mBox{width:min(520px,100%);background:linear-gradient(160deg,#0b1224,#060812);border:1px solid rgba(255,215,0,0.18);border-radius:18px;box-shadow:0 26px 70px rgba(0,0,0,0.75);padding:16px 16px;}
.mT{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:rgba(255,215,0,0.9);}
.mSub{margin-top:4px;color:rgba(255,255,255,0.5);font-size:13px;letter-spacing:0.2px;}
.mRow{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
.mIt{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);}
.mIt b{color:rgba(255,255,255,0.92)}
.mIt span{color:rgba(255,255,255,0.55);font-size:12px;}
.mClose{margin-top:14px;width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:#fff;font-family:'Baloo 2',cursive;font-weight:800;cursor:pointer;}
.mClose:hover{border-color:rgba(255,215,0,0.55);}
.coin{width:22px;height:22px;object-fit:contain;vertical-align:-4px;margin-left:6px;filter:drop-shadow(0 0 10px rgba(255,215,0,0.18));}
.coinIco{width:18px;height:18px;object-fit:contain;vertical-align:-3px;margin-right:7px;filter:drop-shadow(0 0 10px rgba(255,215,0,0.18));}
.logo .lico{display:inline-block;transform:translateY(2px);margin-right:6px;}
.hdrMid{flex:1;min-width:220px;max-width:680px;display:flex;align-items:center;justify-content:center;}
#midBanner{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;
  height:44px;min-width:220px;width:100%;max-width:720px;
  border-radius:999px;padding:0 16px;
  background:radial-gradient(circle at 20% 30%,rgba(255,215,0,0.16),transparent 55%),
             radial-gradient(circle at 80% 70%,rgba(0,180,255,0.12),transparent 55%),
             linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 14px 30px rgba(0,0,0,0.55),0 0 26px rgba(255,215,0,0.10);
  overflow:hidden;}
#midBanner::before{content:'';position:absolute;inset:-2px;border-radius:999px;pointer-events:none;
  background:linear-gradient(90deg,transparent 0,rgba(255,255,255,0.14) 20%,rgba(255,215,0,0.20) 50%,rgba(255,255,255,0.14) 80%,transparent 100%);
  transform:translateX(-60%);animation:midSweep 3.4s ease-in-out infinite;opacity:0.9;}
@keyframes midSweep{0%{transform:translateX(-70%)}50%{transform:translateX(10%)}100%{transform:translateX(70%)}}
#midTxt{position:relative;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3.6px;text-transform:uppercase;
  color:rgba(255,255,255,0.78);text-shadow:0 2px 12px rgba(0,0,0,0.85),0 0 18px rgba(255,215,0,0.14);
  white-space:nowrap;}
#midTxt b{color:var(--gold);font-weight:900;}
.mpod{position:relative;display:flex;align-items:center;gap:10px;min-width:220px;justify-content:center;}
.mp{display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:999px;
  background:linear-gradient(180deg,rgba(0,0,0,0.28),rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 10px 18px rgba(0,0,0,0.35);
  max-width:210px;}
.mp.done{border-color:rgba(255,215,0,0.55);box-shadow:0 12px 22px rgba(0,0,0,0.45),0 0 18px rgba(255,215,0,0.12);}
.mpr{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;line-height:1;}
.mpr.g{color:var(--gold)}.mpr.s{color:#d4d4d4}.mpr.b{color:#cd7f32}
.mpdot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 10px currentColor;flex:0 0 auto;}
.mpn{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1.9px;text-transform:uppercase;
  color:rgba(255,255,255,0.82);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.mpfin{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.65);margin-left:4px;}
.midPip{position:relative;width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle,var(--gold),#a87800 70%);
  box-shadow:0 0 12px rgba(255,215,0,0.35),0 0 4px rgba(255,215,0,0.35);}
.stats-row{display:flex;gap:10px;flex-wrap:nowrap;align-items:center;}
.sbox{text-align:center;background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1px solid rgba(255,215,0,0.22);border-radius:10px;padding:4px 9px;box-shadow:0 10px 24px rgba(0,0,0,0.55),0 0 24px rgba(255,215,0,0.08);}
.sv{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--gold);display:block;line-height:1.05;text-shadow:0 0 18px rgba(255,215,0,0.22);}
.sl{font-size:10px;letter-spacing:2.2px;color:rgba(255,255,255,0.36);text-transform:uppercase;}

/* SCENE */
#scene{position:relative;width:100%;flex:1;min-height:380px;overflow:hidden;}
#skyCanvas{position:absolute;inset:0;width:100%;height:100%;}

/* Rotating emblem (place emblem.png in /public) */
#emblem{position:absolute;left:50%;top:14px;transform:translateX(-50%);width:92px;height:92px;opacity:0.18;
  z-index:2;pointer-events:none;filter:drop-shadow(0 0 16px rgba(140,255,220,0.28));mix-blend-mode:screen;
  animation:spinE 18s linear infinite;}
@keyframes spinE{from{transform:translateX(-50%) rotate(0deg)}to{transform:translateX(-50%) rotate(360deg)}}

/* TRACK LAYERS */
#topGrass{position:absolute;left:0;right:0;bottom:calc(var(--trackBottom) + var(--trackHeight));height:16px;z-index:4;
  background:linear-gradient(180deg,#163808 0%,#1e5210 60%,#276618 100%);}
#topGrass::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 13px,rgba(0,0,0,0.14) 13px,rgba(0,0,0,0.14) 15px);}

#railTop{position:absolute;left:0;right:0;bottom:calc(var(--trackBottom) + var(--trackHeight) + 16px);height:8px;z-index:5;
  background:linear-gradient(180deg,#fff 0%,#e0e0e0 50%,#bbb 100%);
  box-shadow:0 3px 10px rgba(0,0,0,0.7),0 -1px 3px rgba(255,255,255,0.4);}
#railTop::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 54px,rgba(150,150,150,0.45) 54px,rgba(150,150,150,0.45) 57px);}

#dirtTrack{position:absolute;left:0;right:0;bottom:var(--trackBottom);height:var(--trackHeight);z-index:3;}
#dirtTrack::before{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,#d4a040 0%,#c49030 12%,#b47e22 35%,#a46e18 60%,#946010 80%,#845208 100%);}
#dirtTrack::after{content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), rgba(255,255,255,0) 55%),
    radial-gradient(circle at 70% 55%, rgba(0,0,0,0.08), rgba(0,0,0,0) 60%),
    repeating-linear-gradient(180deg,transparent 0,transparent 4px,rgba(0,0,0,0.07) 4px,rgba(0,0,0,0.07) 5px,transparent 5px,transparent 9px,rgba(255,255,255,0.03) 9px,rgba(255,255,255,0.03) 10px),
    repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 8px);
  box-shadow: inset 0 24px 30px rgba(0,0,0,0.22), inset 0 -18px 24px rgba(0,0,0,0.28);
}

body.rain #dirtTrack::before{filter:saturate(0.92) brightness(0.88);} 
body.rain #dirtTrack::after{opacity:0.95;}
body.rain #railTop, body.rain #railBottom{filter:brightness(0.96) saturate(0.9);} 

#laneC{position:absolute;left:0;right:0;bottom:var(--trackBottom);height:var(--trackHeight);z-index:4;pointer-events:none;}

#railBottom{position:absolute;left:0;right:0;bottom:var(--trackBottom);height:7px;z-index:6;
  background:linear-gradient(180deg,#fff 0%,#d5d5d5 60%,#bbb 100%);
  box-shadow:0 -2px 8px rgba(0,0,0,0.6);}
#railBottom::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 54px,rgba(155,155,155,0.4) 54px,rgba(155,155,155,0.4) 57px);}

#botGrass{position:absolute;left:0;right:0;bottom:0;height:5%;min-height:16px;z-index:3;
  background:linear-gradient(180deg,#266614 0%,#1c4e0c 60%,#112f06 100%);}
#botGrass::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 13px,rgba(0,0,0,0.14) 13px,rgba(0,0,0,0.14) 15px);}

/* FINISH LINE */
#finishLine{position:absolute;bottom:var(--trackBottom);height:var(--trackHeight);width:34px;right:82px;z-index:20;
  background:repeating-linear-gradient(0deg,#fff 0,#fff 10px,#111 10px,#111 20px);
  border-left:3px solid rgba(255,255,255,0.7);border-right:3px solid rgba(255,255,255,0.7);
  box-shadow:0 0 20px rgba(255,255,255,0.18),0 8px 22px rgba(0,0,0,0.55);}
#finishLine{background-size:100% 40px;}
#finishLine::before{content:'';position:absolute;inset:-10px -18px;pointer-events:none;
  background:radial-gradient(circle at 50% 50%,rgba(255,255,255,0.10),transparent 65%),
             linear-gradient(180deg,rgba(255,215,0,0.08),transparent 60%);
  filter:blur(0.2px);opacity:0.95;}
#finishLine::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,transparent 0,rgba(255,255,255,0.22) 40%,transparent 75%);
  transform:translateX(-90%);animation:finShine 2.3s ease-in-out infinite;opacity:0.55;}
@keyframes finShine{0%{transform:translateX(-90%)}55%{transform:translateX(40%)}100%{transform:translateX(140%)}}
#finishSign{position:absolute;right:70px;bottom:calc(var(--trackBottom) + var(--trackHeight));z-index:25;
  background:linear-gradient(135deg,#2b1a00 0%,#7a4b00 30%,#ffde7a 55%,#a26a00 78%,#2b1a00 100%);
  color:#0a0703;
  padding:6px 14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;
  border-radius:7px;
  border:1px solid rgba(255,215,0,0.55);
  box-shadow:0 10px 22px rgba(0,0,0,0.75),0 0 22px rgba(255,215,0,0.25);
  white-space:nowrap;}
#finishSign{transform-origin:50% 100%;animation:finBob 2.9s ease-in-out infinite;}
@keyframes finBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
#finishSign::before{content:'';position:absolute;left:10px;right:10px;top:-10px;height:10px;border-radius:10px;
  background:linear-gradient(90deg,rgba(255,255,255,0.0),rgba(255,255,255,0.32),rgba(255,255,255,0.0));
  opacity:0.7;filter:blur(0.2px);}
#finishSign::after{content:'';position:absolute;inset:-2px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.25);pointer-events:none;}

/* STARTING GATES — positioned dynamically by JS */
#gateWrap{position:absolute;bottom:var(--trackBottom);height:calc(var(--trackHeight) + 20px);z-index:30;}
#gateWrap::before{content:'START';position:absolute;left:50%;transform:translateX(-50%);
  top:-28px;
  padding:5px 14px;
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;
  color:#0a0703;
  background:linear-gradient(135deg,#2b1a00 0%,#7a4b00 30%,#ffde7a 55%,#a26a00 78%,#2b1a00 100%);
  border-radius:10px;
  border:1px solid rgba(255,215,0,0.55);
  box-shadow:0 10px 22px rgba(0,0,0,0.7),0 0 18px rgba(255,215,0,0.18);
  white-space:nowrap;}
#gPoleL,#gPoleR{position:absolute;top:0;bottom:0;width:10px;
  background:linear-gradient(90deg,#2b1a00 0%,#a26a00 30%,#ffde7a 55%,#a26a00 78%,#2b1a00 100%);
  border-radius:6px;box-shadow:0 10px 18px rgba(0,0,0,0.7),0 0 18px rgba(255,215,0,0.18);}
#gPoleL{left:0;}#gPoleR{right:0;}
#gTopBar{position:absolute;top:0;left:0;right:0;height:10px;
  background:linear-gradient(180deg,#fff2b8 0%,#FFD700 35%,#a87800 100%);
  border-radius:5px;box-shadow:0 10px 18px rgba(0,0,0,0.65),0 0 18px rgba(255,215,0,0.22);}
.gdoor{position:absolute;left:10px;right:10px;
  background:linear-gradient(90deg,#2b1a00 0%,#7a4b00 20%,#ffde7a 48%,#a26a00 72%,#2b1a00 100%);
  border:1px solid rgba(255,215,0,0.38);
  box-shadow:inset 0 0 18px rgba(0,0,0,0.5),0 10px 18px rgba(0,0,0,0.72),0 0 18px rgba(255,215,0,0.12);
  border-radius:8px;overflow:hidden;
  transform-origin:left center;
  transition:transform 0.45s ease-out,opacity 0.45s;}
.gdoor::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,0.14) 0,rgba(255,255,255,0.14) 2px,transparent 2px,transparent 12px);
  opacity:0.35;}
.gdoor.open{transform:rotateY(88deg) scaleX(0.08);opacity:0;}
.gnum{position:absolute;right:3px;top:50%;transform:translateY(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:10px;color:rgba(255,255,255,0.6);}

/* CROWD WAVE */
#cwave{position:absolute;bottom:calc(var(--trackBottom) + var(--trackHeight) + 24px);left:0;right:0;height:16px;
  display:flex;align-items:flex-end;justify-content:center;gap:1.5px;
  pointer-events:none;z-index:7;opacity:0;transition:opacity 0.5s;}
#cwave.on{opacity:1;}
.cwb{width:3px;background:rgba(255,215,0,0.45);border-radius:2px 2px 0 0;
  animation:cwA 0.32s ease-in-out infinite alternate;}
@keyframes cwA{from{height:3px}to{height:15px}}

/* HORSES */
#hcont{position:absolute;left:0;right:0;bottom:var(--trackBottom);height:var(--trackHeight);z-index:15;}
.hlane{position:absolute;left:0;right:0;}
.hunit{position:absolute;bottom:0;will-change:transform;}

/* Badge */
.hinfo{display:flex;flex-direction:column;align-items:center;margin-bottom:1px;}
.hbadge{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.2px;
  background:rgba(0,0,0,0.78);color:#fff;padding:3px 8px;border-radius:6px;
  border:1px solid rgba(255,255,255,0.28);white-space:nowrap;transition:color 0.3s;
  text-shadow:0 2px 8px rgba(0,0,0,0.98),0 0 14px rgba(0,0,0,0.7);}
.hbadge{background:rgba(0,0,0,0.86);border-color:rgba(255,255,255,0.34);
  text-shadow:0 2px 10px rgba(0,0,0,0.98),0 0 18px rgba(0,0,0,0.85),0 0 12px rgba(255,255,255,0.12);}

/* Horse canvas */
.hcanvas{display:block;}

/* BETTING */
#bsec{background:radial-gradient(circle at 30% 0%,rgba(255,215,0,0.06),transparent 55%),linear-gradient(180deg,var(--dark2),#060812);border-top:2px solid rgba(255,215,0,0.14);padding:7px 12px;flex:0 0 auto;}
.sectit{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4.2px;color:rgba(255,215,0,0.86);margin-bottom:6px;text-shadow:0 0 22px rgba(255,215,0,0.18);}
#hcards{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:8px;}
@media(max-width:560px){#hcards{grid-template-columns:repeat(4,1fr);}}
.hcard{background:radial-gradient(circle at 30% 0%,rgba(255,215,0,0.06),transparent 58%),linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
  border:1.5px solid rgba(255,255,255,0.10);border-radius:14px;padding:8px 6px 7px;text-align:center;cursor:pointer;
  transition:transform 0.16s, box-shadow 0.2s, border-color 0.2s, background 0.2s;position:relative;overflow:hidden;}
.hcard::before{content:'';position:absolute;inset:-2px;border-radius:16px;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,215,0,0.12),transparent 40%,rgba(0,180,255,0.08));opacity:0.55;filter:blur(0.2px);}
.hcard::after{content:'';position:absolute;inset:-40% -80%;
  background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,0.12) 48%,rgba(255,215,0,0.14) 52%,transparent 65%);
  transform:translateX(-35%) rotate(8deg);opacity:0;transition:opacity 0.18s;}
.hcard:hover:not(.locked){border-color:rgba(255,215,0,0.55);transform:translateY(-4px) scale(1.02);
  box-shadow:0 14px 30px rgba(0,0,0,0.55),0 0 24px rgba(255,215,0,0.10);}
.hcard:hover:not(.locked)::after{opacity:1;animation:hSheen 0.9s ease-out 1;}
@keyframes hSheen{0%{transform:translateX(-55%) rotate(8deg)}100%{transform:translateX(35%) rotate(8deg)}}
.hcard.chosen{border-color:rgba(255,215,0,0.95);background:radial-gradient(circle at 35% 0%,rgba(255,215,0,0.10),transparent 58%),linear-gradient(180deg,rgba(255,215,0,0.14),rgba(255,255,255,0.02));
  box-shadow:0 16px 40px rgba(0,0,0,0.62),0 0 34px rgba(255,215,0,0.22),inset 0 0 0 1px rgba(255,215,0,0.18);
  transform:translateY(-5px) scale(1.03);}
.hcard.locked{opacity:0.4;pointer-events:none;}

<script>
const ABSTRACT_LOGO_CANDIDATES = ['abstract_logo.png','abstract-logo.png','abstract penguin.png'];
let hasAbstractLogo = false;
let abstractLogoSrc = '';

function fitMobileToScreen(){
  const root = document.getElementById('fitRoot');
  if(!root) return;
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent||'') || (Math.min(screen.width||9999, screen.height||9999) <= 900);
  if(!isMobile) { root.style.transform=''; root.style.width=''; return; }

  const isLandscape = (window.matchMedia && window.matchMedia('(orientation: landscape)').matches);
  if(!isLandscape) { root.style.transform=''; root.style.width=''; return; }

  root.style.transform='';
  root.style.width='';
  const r = root.getBoundingClientRect();
  const vw = Math.max(1, window.innerWidth);
  const vh = Math.max(1, window.innerHeight);

  const sx = vw / Math.max(1, r.width);
  const sy = vh / Math.max(1, r.height);
  const s = Math.min(1, sx, sy);

  root.style.transform = `scale(${s})`;
  root.style.width = `calc(100% / ${s})`;
}

addEventListener('resize', ()=>setTimeout(fitMobileToScreen, 50));
addEventListener('orientationchange', ()=>setTimeout(fitMobileToScreen, 80));
setTimeout(fitMobileToScreen, 0);

// UI SFX
let uiSfxOn = true;

let raceMusicEl=null;

let dailyPts=0;
let lifePts=0;
let dailyKey='';
let dpTimer=null;

const DAILY_BANKROLL = 20000;
let chipsKey='';

let _pendingRacePayment = false;

let _raceMusicPrimed = false;

let _selectedWasUnderdog = false;

function utcDateKey(ts=Date.now()){
  const d=new Date(ts);
  return d.toISOString().slice(0,10);
}

function msToHMS(ms){
  const s=Math.max(0,Math.floor(ms/1000));
  const h=Math.floor(s/3600);
  const m=Math.floor((s%3600)/60);
  const ss=(s%60);
  const p=n=>String(n).padStart(2,'0');
  return `${p(h)}:${p(m)}:${p(ss)}`;
}

function loadPoints(){
  try{
    lifePts=Number(localStorage.getItem('DERBY_LIFE_POINTS')||'0')||0;
  }catch(e){lifePts=0;}
  try{
    dailyKey=String(localStorage.getItem('DERBY_DAILY_KEY')||'');
    dailyPts=Number(localStorage.getItem('DERBY_DAILY_POINTS')||'0')||0;
  }catch(e){dailyKey='';dailyPts=0;}
  resetDailyIfNeeded();
  renderDaily();
  startDailyCountdown();
}

function loadChipsBankroll(){
  try{
    chipsKey=String(localStorage.getItem('DERBY_CHIPS_KEY')||'');
    const st=Number(localStorage.getItem('DERBY_CHIPS_BAL')||'0');
    if(Number.isFinite(st) && st>0) balance=st;
  }catch(e){}
  resetChipsIfNeeded();
}

function resetChipsIfNeeded(){
  const k=utcDateKey();
  if(chipsKey!==k){
    chipsKey=k;
    balance=DAILY_BANKROLL;
    resetDailyIfNeeded();
    try{
      localStorage.setItem('DERBY_CHIPS_KEY',chipsKey);
      localStorage.setItem('DERBY_CHIPS_BAL',String(balance));
    }catch(e){}
  }
}

function resetDailyIfNeeded(){
  const k=utcDateKey();
  if(dailyKey!==k){
    dailyKey=k;
    dailyPts=0;
    try{
      localStorage.setItem('DERBY_DAILY_KEY',dailyKey);
      localStorage.setItem('DERBY_DAILY_POINTS',String(dailyPts));
    }catch(e){}
  }
}

function renderDaily(){
  const el=document.getElementById('dpV');
  if(el) el.textContent=Number(dailyPts||0).toLocaleString();
}

function startDailyCountdown(){
  if(dpTimer) clearInterval(dpTimer);
  const tick=()=>{
    resetDailyIfNeeded();
    renderDaily();
    const now=Date.now();
    const d=new Date(now);
    const next=new Date(now);
    next.setUTCHours(24,0,0,0);
    const left=Math.max(0,next.getTime()-now);
    const r=document.getElementById('balR');
    if(r) r.textContent=`· resets ${msToHMS(left)} UTC`;
  };
  tick();
  dpTimer=setInterval(tick,1000);
}

function missionsKey(){
  return 'DERBY_MISSIONS_'+utcDateKey();
}

function missionsStreakKey(){
  return 'DERBY_MISSIONS_STREAK_'+utcDateKey();
}

function getMissions(){
  const list=[
    {id:'races5', title:'Grind the track', desc:'Finish 5 races', goal:5, type:'race_count', reward:500},
    {id:'pod2', title:'Hot streak', desc:'Get 2 podiums in a row', goal:2, type:'podium_streak', reward:700},
    {id:'underdog', title:'Underdog winner', desc:'Win with the highest odds horse', goal:1, type:'underdog_win', reward:900},
  ];
  let st={};
  try{ st=JSON.parse(localStorage.getItem(missionsKey())||'{}')||{}; }catch(e){ st={}; }
  return { list, st };
}

function setMissionState(next){
  try{ localStorage.setItem(missionsKey(), JSON.stringify(next||{})); }catch(e){}
}

function incMission(type, amt){
  const { list, st } = getMissions();
  let changed=false;
  list.forEach(m=>{
    if(m.type!==type) return;
    const cur=Number(st[m.id]||0)||0;
    const nx=Math.max(cur, cur + (amt||1));
    if(nx!==cur){ st[m.id]=nx; changed=true; }
  });
  if(changed) {
    setMissionState(st);
    const ov=document.getElementById('mOv');
    if(ov && ov.classList.contains('on')) renderMissions();
  }
}

function setPodiumStreak(n){
  try{ localStorage.setItem(missionsStreakKey(), String(Math.max(0, Number(n||0)||0))); }catch(e){}
}

function getPodiumStreak(){
  try{ return Math.max(0, Number(localStorage.getItem(missionsStreakKey())||'0')||0); }catch(e){ return 0; }
}

function bumpPodiumStreak(isPodium){
  const cur=getPodiumStreak();
  const nx=isPodium ? (cur+1) : 0;
  setPodiumStreak(nx);
  if(isPodium) incMission('podium_streak', 1);
  return nx;
}

function renderMissions(){
  const ov=document.getElementById('mOv');
  const listEl=document.getElementById('mList');
  if(!listEl) return;
  const { list, st } = getMissions();
  listEl.innerHTML='';
  list.forEach(m=>{
    const cur=Number(st[m.id]||0)||0;
    const done=cur>=m.goal;
    const row=document.createElement('div');
    row.className='mIt';
    row.innerHTML=`<div><b>${m.title}</b><div><span>${m.desc}</span></div></div><div style="text-align:right"><div style="font-weight:900;color:${done?'#00e87a':'rgba(255,255,255,0.85)'}">${Math.min(cur,m.goal)}/${m.goal}</div><div style="margin-top:2px"><span>Reward ${m.reward}</span></div></div>`;
    listEl.appendChild(row);
  });
}

function toggleMissions(on){
  const ov=document.getElementById('mOv');
  if(!ov) return;
  ov.classList.toggle('on', !!on);
  if(on) renderMissions();
}

function uiClickSfx(kind='tap'){
  if(!uiSfxOn) return;
  if(!ensureAudio()) return;
  try{
    const now=audioCtx.currentTime;
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    const f = kind==='go' ? 620 : (kind==='select' ? 520 : (kind==='count'?760:420));
    o.type='triangle';
    o.frequency.setValueAtTime(f, now);
    o.frequency.exponentialRampToValueAtTime(f*1.35, now+0.06);
    g.gain.setValueAtTime(0.0001, now);
    const a=(kind==='go'?0.18:(kind==='count'?0.10:0.12));
    const d=(kind==='go'?0.11:(kind==='count'?0.07:0.10));
    g.gain.exponentialRampToValueAtTime(a, now+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now+d);
    o.connect(g); g.connect(audioMaster);
    o.start(now); o.stop(now+d+0.01);
  }catch(e){}
}

function podiumIds(rank, fin){
  const used=new Set();
  const pickNext=()=>{
    for (let i=0;i<rank.length;i++) {
      const id=rank[i]?.id;
      if(id && !used.has(id)) { used.add(id); return id; }
    }
    return null;
  };
  const top=[null,null,null];
  for(let i=0;i<3;i++){
    if(fin[i]){ top[i]=fin[i]; used.add(fin[i]); }
  }
  for(let i=0;i<3;i++) if(!top[i]) top[i]=pickNext();
  return top;
}

function setMidPodium(rank, fin){
  const ids=podiumIds(rank, fin||[]);
  for(let i=0;i<3;i++){
    const id=ids[i];
    const mp=document.getElementById(`mp${i+1}`);
    const dot=document.getElementById(`mpd${i+1}`);
    const name=document.getElementById(`mpn${i+1}`);
    const finEl=document.getElementById(`mpf${i+1}`);
    if(!mp||!dot||!name||!finEl) continue;
    if(!id){
      name.textContent='—';
      dot.style.background='rgba(255,255,255,0.25)';
      dot.style.color='rgba(255,255,255,0.25)';
      finEl.textContent='';
      mp.classList.remove('done');
      continue;
    }
    const h=HORSES[id-1];
    name.textContent=h?.short||h?.name||`#${id}`;
    const col=h?.color||'rgba(255,255,255,0.6)';
    dot.style.background=col;
    dot.style.color=col;
    const done = (fin && fin[i]===id);
    finEl.textContent = done ? 'END' : '';
    mp.classList.toggle('done', !!done);
  }
}

function prepAbstractLogo(){
  const a=document.getElementById('absLogo');
  const c=document.getElementById('coinIco');
  let i=0;

  const tryNext=()=>{
    if (i>=ABSTRACT_LOGO_CANDIDATES.length) {
      hasAbstractLogo=false; abstractLogoSrc='';
      if(a)a.style.display='none';
      if(c)c.style.display='none';
      return;
    }
    const src=ABSTRACT_LOGO_CANDIDATES[i++];
    const img=new Image();
    img.onload=()=>{
      hasAbstractLogo=true; abstractLogoSrc=src;
      if(a){a.src=src;a.style.display='inline-block';}
      if(c){c.src=src;c.style.display='inline-block';}
    };
    img.onerror=tryNext;
    img.src=src;
  };

  tryNext();
}

function coinHTML(cls='coin'){
  return hasAbstractLogo ? `<img class="${cls}" src="${abstractLogoSrc}" alt="" />` : '🪙';
}

function makeTransparentWhiteBg(img){
  return img;
  try{
    const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
    if(!w||!h) return img;
    const c=document.createElement('canvas');
    c.width=w; c.height=h;
    const ctx=c.getContext('2d',{willReadFrequently:true});
    ctx.drawImage(img,0,0);
    const im=ctx.getImageData(0,0,w,h);
    const d=im.data;
    const tol = 26;
    const tol2 = tol*tol;
    const qx = new Int32Array(w*h);
    const qy = new Int32Array(w*h);

    const idx = (x,y)=> (y*w+x);
    const off = (x,y)=> idx(x,y)*4;
    const dist2 = (r,g,b, tr,tg,tb) => {
      const dr=r-tr, dg=g-tg, db=b-tb;
      return dr*dr+dg*dg+db*db;
    };

    const flood = (sx,sy)=>{
      // Per-seed visited is important: shared visited can block later seeds
      // from reaching pixels that didn't match earlier seed colors.
      const visited = new Uint8Array(w*h);
      const o0=off(sx,sy);
      const ta=d[o0], tb=d[o0+1], tc=d[o0+2], aa=d[o0+3];
      if(aa<8) return;
      let head=0, tail=0;
      qx[tail]=sx; qy[tail]=sy; tail++;
      visited[idx(sx,sy)]=1;
      while(head<tail){
        const x=qx[head], y=qy[head]; head++;
        const o=off(x,y);
        const r=d[o], g=d[o+1], b=d[o+2], a=d[o+3];
        if(a<8) continue;
        if(dist2(r,g,b,ta,tb,tc) > tol2) continue;
        d[o+3]=0;
        if(x>0){
          const ni=idx(x-1,y);
          if(!visited[ni]){visited[ni]=1;qx[tail]=x-1;qy[tail]=y;tail++;}
        }
        if(x<w-1){
          const ni=idx(x+1,y);
          if(!visited[ni]){visited[ni]=1;qx[tail]=x+1;qy[tail]=y;tail++;}
        }
        if(y>0){
          const ni=idx(x,y-1);
          if(!visited[ni]){visited[ni]=1;qx[tail]=x;qy[tail]=y-1;tail++;}
        }
        if(y<h-1){
          const ni=idx(x,y+1);
          if(!visited[ni]){visited[ni]=1;qx[tail]=x;qy[tail]=y+1;tail++;}
        }
      }
    };

    // Flood from corners and a few edge points (handles slight gradients/compression)
    flood(0,0);
    flood(w-1,0);
    flood(0,h-1);
    flood(w-1,h-1);
    flood((w/2)|0,0);
    flood((w/2)|0,h-1);
    flood(0,(h/2)|0);
    flood(w-1,(h/2)|0);

    for(let i=0;i<d.length;i+=4){
      const a=d[i+3];
      if(a<8) continue;
      const r=d[i], g=d[i+1], b=d[i+2];
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
      const avg=(r+g+b)/3;
      // near-white + low saturation
      if(avg>235 && (mx-mn)<22){
        if(avg>250){
          d[i+3]=0;
        } else {
          // Feather 235..250
          const t=Math.min(1, Math.max(0, (250-avg)/(250-235)));
          d[i+3]=Math.round(a*t*t);
        }
      }
    }
    ctx.putImageData(im,0,0);
    return c;
  } catch(e){
    return img;
  }
}

function chanceFromOdds(h){
  const w=HORSES.map(x=>1/x.odds);
  const t=w.reduce((a,b)=>a+b,0);
  const p=(1/h.odds)/t;
  return Math.round(p*1000)/10; // 1 decimal
}

function analyzeHorseSprite(canvas){
  try{
    const w=canvas.width, h=canvas.height;
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    const im=ctx.getImageData(0,0,w,h);
    const d=im.data;
    let minX=w, minY=h, maxX=-1, maxY=-1;
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const a=d[(y*w+x)*4+3];
        if(a>12){
          if(x<minX)minX=x;
          if(y<minY)minY=y;
          if(x>maxX)maxX=x;
          if(y>maxY)maxY=y;
        }
      }
    }
    if(maxX<0) return {minX:0,minY:0,maxX:w-1,maxY:h-1,cutY:Math.round(h*0.68)};
    const bw=maxX-minX+1;
    const bh=maxY-minY+1;

    // Find a cutoff Y above the legs by scanning upward from the bottom.
    // Legs have narrow pixel coverage; body has wider coverage.
    let cutY=maxY;
    const bodyThresh = 0.58;
    for(let y=maxY;y>minY;y--){
      let cnt=0;
      for(let x=minX;x<=maxX;x++){
        const a=d[(y*w+x)*4+3];
        if(a>12) cnt++;
      }
      const cov=cnt/bw;
      if(cov>bodyThresh){
        cutY=y;
        break;
      }
    }
    // Nudge upward a bit to avoid any built-in hoof pixels
    cutY=Math.max(minY+1, cutY-2);

    return {minX,minY,maxX,maxY,cutY,bw,bh};
  } catch(e){
    return {minX:0,minY:0,maxX:canvas.width-1,maxY:canvas.height-1,cutY:Math.round(canvas.height*0.68),bw:canvas.width,bh:canvas.height};
  }
}

function getLayout() {
  const sc = document.getElementById('scene');
  const scW = sc.offsetWidth, scH = sc.offsetHeight;
  const rs = getComputedStyle(document.documentElement);
  const th = parseFloat(rs.getPropertyValue('--trackHeight'));
  const tb = parseFloat(rs.getPropertyValue('--trackBottom'));
  const trackH = scH * (isFinite(th) ? (th/100) : 0.60);
  const laneH  = trackH / N;
  // Gate at ~11% from left
  const gateX  = Math.round(scW * 0.11);
  // Horses start behind the gate doors
  const startX = gateX - 34;
  const endX   = scW - 86;
  return {scW, scH, trackH, laneH, gateX, startX, endX, trackPx: endX - startX, trackBottom: isFinite(tb)?(tb/100):0.05};
}

function animSky() {
  const c = document.getElementById('skyCanvas'); if (!c) return;
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  skyT += 16;
  const clamp01 = (x)=>Math.max(0,Math.min(1,x));
  const lerp = (a,b,t)=>a+(b-a)*t;
  const ease = (t)=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

  const CYCLE = 520000;
  const NIGHT_HOLD = 190000;
  const DAWN = 70000;
  const DAY_HOLD = 190000;
  const DUSK = 70000;
  const tc = (skyT % CYCLE);

  let dayAmt = 0;
  let nightAmt = 1;
  const off = Math.max(W,H) * 0.28;
  let sx = W*0.18, sy = H*0.12;
  let mx = W*0.13, my = H*0.11;

  if (tc < NIGHT_HOLD) {
    dayAmt = 0;
    nightAmt = 1;
    mx = W*0.13; my = H*0.11;
    sx = W + off; sy = H*0.30;
  } else if (tc < NIGHT_HOLD + DAWN) {
    const t = ease((tc - NIGHT_HOLD)/DAWN);
    dayAmt = clamp01(t);
    nightAmt = 1 - dayAmt;
    mx = lerp(W*0.13, W + off, t);
    my = lerp(H*0.11, H*0.30, t);
    sx = lerp(-off, W*0.18, t);
    sy = lerp(H*0.36, H*0.12, t);
  } else if (tc < NIGHT_HOLD + DAWN + DAY_HOLD) {
    dayAmt = 1;
    nightAmt = 0;
    sx = W*0.18; sy = H*0.12;
    mx = -off; my = H*0.32;
  } else {
    const t = ease((tc - (NIGHT_HOLD + DAWN + DAY_HOLD))/DUSK);
    dayAmt = 1 - clamp01(t);
    nightAmt = 1 - dayAmt;
    sx = lerp(W*0.18, W + off, t);
    sy = lerp(H*0.12, H*0.30, t);
    mx = lerp(-off, W*0.13, t);
    my = lerp(H*0.30, H*0.11, t);
  }

  const cycleIndex = Math.floor(skyT / CYCLE);
  const rainOn = (dayAmt > 0.75) && (cycleIndex % 2 === 0);
  document.body.classList.toggle('rain', rainOn);

  // Sky gradient blend
  const sg = ctx.createLinearGradient(0,0,0,H);
  const topDay = `rgb(${Math.round(60+30*dayAmt)},${Math.round(140+40*dayAmt)},${Math.round(210+15*dayAmt)})`;
  const midDay = `rgb(${Math.round(90+25*dayAmt)},${Math.round(175+35*dayAmt)},${Math.round(235+10*dayAmt)})`;
  const topNight = '#010305';
  const midNight = '#091828';
  sg.addColorStop(0, topNight);
  sg.addColorStop(0.22, midNight);
  sg.addColorStop(0.55, `rgba(16,32,53,1)`);
  sg.addColorStop(1, '#182f48');
  ctx.fillStyle = sg; ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.globalAlpha = dayAmt * 0.92;
  const sgD = ctx.createLinearGradient(0,0,0,H);
  sgD.addColorStop(0, topDay);
  sgD.addColorStop(0.35, midDay);
  sgD.addColorStop(1, `rgb(${Math.round(210+15*dayAmt)},${Math.round(175+10*dayAmt)},${Math.round(120+5*dayAmt)})`);
  ctx.fillStyle = sgD; ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Day haze / moving light (adds life during day)
  if (dayAmt > 0.05) {
    ctx.save();
    ctx.globalAlpha = Math.min(0.14, dayAmt * 0.12);
    const hx = W * (0.2 + 0.6 * ((skyT/120000) % 1));
    const hy = H * 0.18;
    const hg2 = ctx.createRadialGradient(hx, hy, 10, hx, hy, Math.max(W,H)*0.55);
    hg2.addColorStop(0, 'rgba(255,255,255,0.22)');
    hg2.addColorStop(0.35, 'rgba(255,255,255,0.08)');
    hg2.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hg2;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Heat shimmer band near horizon (day only)
  if (dayAmt > 0.35) {
    ctx.save();
    const bandY = H * 0.44;
    const amp = 0.012 + 0.01*Math.sin(skyT/1400);
    ctx.globalAlpha = Math.min(0.16, dayAmt*0.11);
    const sh = ctx.createLinearGradient(0, bandY, 0, bandY + H*0.12);
    sh.addColorStop(0, `rgba(255,255,255,${0.10+amp})`);
    sh.addColorStop(0.5, 'rgba(255,255,255,0.02)');
    sh.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sh;
    ctx.fillRect(0, bandY, W, H*0.12);
    ctx.restore();
  }

  skyO.forEach(o => {
    if (o.type==='neb') {
      o.x+=o.drift; if(o.x>W+o.w)o.x=-o.w; if(o.x<-o.w)o.x=W+o.w;
      const ng=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.w/1.5);
      ng.addColorStop(0,`hsla(${o.hue},65%,55%,${o.a})`);
      ng.addColorStop(1,`hsla(${o.hue},65%,55%,0)`);
      ctx.save(); ctx.fillStyle=ng; ctx.beginPath();
      ctx.ellipse(o.x,o.y,o.w/2,o.h/2,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    } else if (o.type==='star') {
      const a=o.a*(0.55+0.45*Math.sin(skyT/1000*o.tw+o.off)) * (0.15 + nightAmt*0.95);
      ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=o.col;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      if(o.r>1.8){ctx.globalAlpha=a*0.3;ctx.strokeStyle=o.col;ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(o.x-o.r*3.5,o.y);ctx.lineTo(o.x+o.r*3.5,o.y);
        ctx.moveTo(o.x,o.y-o.r*3.5);ctx.lineTo(o.x,o.y+o.r*3.5);ctx.stroke();}
      ctx.restore();
    } else if (o.type==='sun') {
      o.x = sx; o.y = sy;
      ctx.save();
      ctx.globalAlpha = dayAmt;
      const gg=ctx.createRadialGradient(o.x,o.y,o.r*0.2,o.x,o.y,o.r*3.8);
      gg.addColorStop(0,'rgba(255,245,190,0.85)');
      gg.addColorStop(0.25,'rgba(255,215,120,0.42)');
      gg.addColorStop(1,'rgba(255,215,120,0)');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(o.x,o.y,o.r*3.8,0,Math.PI*2); ctx.fill();
      const sb=ctx.createRadialGradient(o.x-o.r*0.25,o.y-o.r*0.25,0,o.x,o.y,o.r);
      sb.addColorStop(0,'#fff8d0'); sb.addColorStop(0.55,'#ffd26a'); sb.addColorStop(1,'#ff9f2d');
      ctx.fillStyle=sb; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (o.type==='moon') {
      o.x = mx; o.y = my;
      ctx.save();
      ctx.globalAlpha = 0.25 + nightAmt*0.9;
      const mg=ctx.createRadialGradient(o.x,o.y,o.r*0.5,o.x,o.y,o.r*3);
      mg.addColorStop(0,'rgba(255,248,200,0.22)'); mg.addColorStop(1,'rgba(255,248,200,0)');
      ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(o.x,o.y,o.r*3,0,Math.PI*2); ctx.fill();
      const mb=ctx.createRadialGradient(o.x-o.r*0.3,o.y-o.r*0.3,0,o.x,o.y,o.r);
      mb.addColorStop(0,'#fffde8'); mb.addColorStop(0.55,'#f5e68a'); mb.addColorStop(1,'#c09820');
      ctx.fillStyle=mb; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.18; ctx.fillStyle='#7a6010';
      [[o.x+8,o.y-8,5],[o.x-10,o.y+6,4.5],[o.x+3,o.y+12,3.5],[o.x-5,o.y-14,4]].forEach(([cx,cy,cr])=>{
        ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.fill();});
      ctx.restore();
    } else if (o.type==='shoot') {
      o.timer+=16;
      if(!o.active&&o.timer>=o.next){
        o.active=true;o.timer=0;o.prog=0;o.a=1;
        o.x=Math.random()*W*0.55+W*0.05; o.y=Math.random()*H*0.22;
        o.next=3500+Math.random()*9000;}
      if(o.active){
        o.prog+=o.spd; o.a=Math.max(0,1-o.prog/o.len);
        if(o.prog>=o.len){o.active=false;return;}
        const ex=o.x+Math.cos(o.ang)*o.prog, ey=o.y+Math.sin(o.ang)*o.prog;
        const sg2=ctx.createLinearGradient(o.x,o.y,ex,ey);
        sg2.addColorStop(0,'rgba(255,255,255,0)');
        sg2.addColorStop(0.6,`rgba(255,255,255,${o.a*0.6})`);
        sg2.addColorStop(1,`rgba(255,255,255,${o.a})`);
        ctx.save();ctx.strokeStyle=sg2;ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(ex,ey);ctx.stroke();
        ctx.globalAlpha=o.a;ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(ex,ey,2.5,0,Math.PI*2);ctx.fill();ctx.restore();}
    } else if (o.type==='cloud') {
      o.x+=o.spd; if(o.x>W+o.w)o.x=-o.w;
      ctx.save();
      const baseA = o.a * (0.25 + dayAmt*1.35);
      ctx.globalAlpha=baseA;
      const cg=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.w/2);
      cg.addColorStop(0, dayAmt>0.5?'rgba(255,255,255,1)':'rgba(180,215,255,1)');
      cg.addColorStop(1,'rgba(180,215,255,0)');
      ctx.fillStyle=cg; ctx.ellipse(o.x,o.y,o.w/2,o.h/2,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (o.type==='cloud2') {
      o.x+=o.spd; if(o.x>W+o.w)o.x=-o.w;
      ctx.save();
      const baseA = o.a * (0.16 + dayAmt*1.55);
      ctx.globalAlpha=baseA;
      const cg=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.w/2);
      cg.addColorStop(0, dayAmt>0.55?'rgba(255,255,255,1)':'rgba(190,225,255,1)');
      cg.addColorStop(1,'rgba(190,225,255,0)');
      ctx.fillStyle=cg;
      ctx.beginPath();
      ctx.ellipse(o.x,o.y,o.w/2,o.h/2,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (o.type==='bird') {
      if (dayAmt < 0.55) return;
      o.x += o.spd;
      if (o.x > W + 40) { o.x = -40; o.y = H*(0.10+Math.random()*0.22); o.spd = 0.18+Math.random()*0.55; o.s=0.7+Math.random()*1.2; }
      const flap = Math.sin(skyT/120 * o.s + o.off);
      const bx = o.x, by = o.y + flap*2.2;
      ctx.save();
      ctx.globalAlpha = 0.35 + dayAmt*0.25;
      ctx.strokeStyle = 'rgba(0,0,0,0.65)';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.quadraticCurveTo(bx-6*o.s, by-3-2*flap, bx-14*o.s, by+1);
      ctx.moveTo(bx, by);
      ctx.quadraticCurveTo(bx+6*o.s, by-3-2*flap, bx+14*o.s, by+1);
      ctx.stroke();
      ctx.restore();
    } else if (o.type==='rain') {
      if (!rainOn) return;
      o.y += o.spd;
      o.x += o.drift;
      if (o.y > H + 30) { o.y = -30; o.x = Math.random()*W; }
      if (o.x < -40) o.x = W + 40;
      ctx.save();
      ctx.globalAlpha = 0.14 + dayAmt*0.18;
      ctx.strokeStyle = 'rgba(210,235,255,0.85)';
      ctx.lineWidth = o.w;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y);
      ctx.lineTo(o.x + o.drift*2.2, o.y + o.len);
      ctx.stroke();
      ctx.restore();
    } else if (o.type==='planet') {
      ctx.save();
      const pg=ctx.createRadialGradient(o.x-o.r*0.35,o.y-o.r*0.35,0,o.x,o.y,o.r);
      pg.addColorStop(0,'#e0c090');pg.addColorStop(0.5,'#c8a070');pg.addColorStop(1,'#9a6030');
      ctx.fillStyle=pg;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.28;ctx.fillStyle='#7a5020';
      ctx.beginPath();ctx.ellipse(o.x,o.y+3,o.r*0.94,o.r*0.2,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(o.x,o.y-4,o.r*0.84,o.r*0.15,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else if (o.type==='ufo') {
      if (nightAmt < 0.55) { o.active = false; return; }
      // Advance timer
      o.timer += 16;
      if (!o.active && o.timer >= o.next) {
        o.active = true; o.timer = 0;
        o.dir = Math.random() > 0.5 ? 1 : -1;
        o.x = o.dir === 1 ? -220 : W + 220;
        o.y = H * (0.08 + Math.random() * 0.22);
        o.next = 9000 + Math.random() * 14000;
        o.bp = 0; o.wob = 0; o.wy = 0;
      }
      if (!o.active) return;
      o.x += o.dir * o.spd;
      o.wob += 0.055; o.wy = Math.sin(o.wob) * 5;
      o.bp += 0.09;
      if ((o.dir===1 && o.x > W+220) || (o.dir===-1 && o.x < -220)) {
        o.active = false; return;
      }
      const ux = o.x, uy = o.y + o.wy;
      ctx.save();
      // Tractor beam
      const beamA = 0.1 + 0.06 * Math.sin(o.bp);
      const bG = ctx.createLinearGradient(ux, uy+12, ux, uy+90);
      bG.addColorStop(0, `rgba(80,255,80,${beamA*2.5})`);
      bG.addColorStop(1, 'rgba(80,255,80,0)');
      ctx.fillStyle = bG;
      ctx.beginPath();
      ctx.moveTo(ux-10,uy+12); ctx.lineTo(ux+10,uy+12);
      ctx.lineTo(ux+38,uy+90); ctx.lineTo(ux-38,uy+90);
      ctx.closePath(); ctx.fill();
      // Outer glow
      const gG = ctx.createRadialGradient(ux,uy,0,ux,uy,60);
      gG.addColorStop(0,'rgba(60,255,60,0.2)'); gG.addColorStop(1,'rgba(60,255,60,0)');
      ctx.fillStyle=gG; ctx.beginPath();ctx.arc(ux,uy,60,0,Math.PI*2);ctx.fill();
      // Shadow underneath saucer
      ctx.globalAlpha=0.4;
      const shG=ctx.createEllipse ? null : null;
      ctx.fillStyle='#0a200a';
      ctx.beginPath();ctx.ellipse(ux,uy+6,34,11,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      // Saucer body
      const sG=ctx.createLinearGradient(ux-40,uy-8,ux+40,uy+8);
      sG.addColorStop(0,'#1a3a1a');sG.addColorStop(0.3,'#3a6a3a');
      sG.addColorStop(0.7,'#4a8a4a');sG.addColorStop(1,'#1a3a1a');
      ctx.fillStyle=sG;
      ctx.beginPath();ctx.ellipse(ux,uy,40,10,0,0,Math.PI*2);ctx.fill();
      // Rim highlight
      ctx.strokeStyle='rgba(80,255,80,0.6)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(ux,uy,40,10,0,Math.PI,2*Math.PI);ctx.stroke();
      // Cockpit dome
      const dG=ctx.createRadialGradient(ux-5,uy-12,0,ux,uy-9,17);
      dG.addColorStop(0,'rgba(180,255,180,0.95)');
      dG.addColorStop(0.4,'rgba(40,200,40,0.75)');
      dG.addColorStop(1,'rgba(10,70,10,0.5)');
      ctx.fillStyle=dG;
      ctx.beginPath();ctx.ellipse(ux,uy-8,16,13,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(80,255,80,0.35)';ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(ux,uy-8,16,13,0,0,Math.PI*2);ctx.stroke();
      // Blinking lights
      [[-26,3],[0,7],[26,3],[-14,0],[14,0]].forEach(([lx,ly],i) => {
        const lp = Math.sin(o.bp * 2.2 + i * 1.3);
        const lc = i%2===0
          ? `rgba(255,${160+lp*90|0},0,${0.65+lp*0.35})`
          : `rgba(0,${190+lp*65|0},255,${0.65+lp*0.35})`;
        ctx.fillStyle = lc;
        ctx.beginPath(); ctx.arc(ux+lx, uy+ly, 2.8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = lc.replace(/[\d.]+\)$/, '0.25)');
        ctx.beginPath(); ctx.arc(ux+lx, uy+ly, 5.5, 0, Math.PI*2); ctx.fill();
      });
      ctx.restore();
    } else if (o.type==='hero') {
      if (dayAmt < 0.75) { o.active = false; return; }
      o.timer += 16;
      if (!o.active && o.timer >= o.next) {
        o.active = true; o.timer = 0;
        o.dir = Math.random() > 0.5 ? 1 : -1;
        o.x = o.dir === 1 ? -240 : W + 240;
        o.y = H * (0.16 + Math.random() * 0.12);
        o.next = 9000 + Math.random() * 15000;
        o.bp = 0; o.wob = 0; o.wy = 0; o.pass = 0;
        o.spd = 1.9;
      }
      if (!o.active) return;
      o.x += o.dir * o.spd;
      o.wob += 0.08; o.wy = Math.sin(o.wob) * 7;
      o.bp += 0.12;
      if ((o.dir===1 && o.x > W+240) || (o.dir===-1 && o.x < -240)) {
        if (o.pass === 0) {
          o.pass = 1;
          o.dir *= -1;
          o.x = o.dir === 1 ? -240 : W + 240;
          o.spd = 1.1;
        } else {
          o.active = false; return;
        }
      }
      const hx = o.x, hy = o.y + o.wy;
      ctx.save();
      const dir = o.dir;
      ctx.globalAlpha = 0.85;
      const trail=ctx.createLinearGradient(hx,hy,hx - dir*110,hy+10);
      trail.addColorStop(0,'rgba(120,220,255,0.40)');
      trail.addColorStop(1,'rgba(120,220,255,0)');
      ctx.strokeStyle=trail; ctx.lineWidth=7;
      ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx - dir*110, hy+10); ctx.stroke();

      if (heroImg && heroImg.complete && (heroImg.naturalWidth||0) > 0) {
        const iw = heroImg.naturalWidth || heroImg.width;
        const ih = heroImg.naturalHeight || heroImg.height;
        const targetH = Math.max(44, Math.min(86, H*0.12));
        const targetW = targetH * (iw/ih);
        ctx.globalAlpha = 0.98;
        ctx.translate(hx, hy);
        if (dir === 1) ctx.scale(-1, 1);
        ctx.drawImage(heroImg, -targetW/2, -targetH/2, targetW, targetH);
      }
      ctx.restore();
    }
  });
  // Horizon glow
  const hg=ctx.createLinearGradient(0,H*0.46,0,H*0.52);
  hg.addColorStop(0,'rgba(255,140,40,0)');hg.addColorStop(0.5,'rgba(255,100,20,0.05)');
  hg.addColorStop(1,'rgba(255,70,0,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,H*0.46,W,H*0.06);

  if (rainOn) {
    ctx.save();
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = 'rgba(220,235,255,1)';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  skyRAF = requestAnimationFrame(animSky);
}

window.addEventListener('load', () => {
  prepAbstractLogo();

  // Payment messages from parent (AGW hub)
  window.addEventListener('message', (e) => {
    if(!e.data?.type) return;
    if(e.data.type==='AGW_START_GAME') {
      _racePaymentOk();
    }
    if(e.data.type==='AGW_TX_ERROR') {
      _racePaymentFail(e.data?.msg || 'Transaction failed');
    }
    if(e.data.type==='AGW_PAYMENT_PENDING') {
      _pendingRacePayment = true;
    }
    if(e.data.type==='AGW_PAYMENT_CONFIRMED') {
      _pendingRacePayment = false;
    }
  });

  const loads = HORSES.map(h => new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      HORSE_IMAGES[h.id] = makeTransparentWhiteBg(img);
      HORSE_META[h.id] = {w: img.naturalWidth||img.width, h: img.naturalHeight||img.height};
      res();
    };
    img.onerror = () => { HORSE_IMAGES[h.id] = null; res(); };
    img.src = h.img;
  }));

  heroImg = new Image();
  heroImg.src = 'superheroe.png';

  Promise.all(loads).then(() => {
    const afterHorseReady=()=>{
      loadPoints();
      loadChipsBankroll();
      initSky();
      makeCrowdWave();
      makeHorseCards();
      randomizeOddsAndWinPct();
      buildScene();
      updateStats();
      startLegAnim();

      // UI SFX
      document.querySelectorAll('.abtn').forEach(b=>b.addEventListener('click',()=>uiClickSfx('tap')));
      const go=document.getElementById('goBtn'); if(go) go.addEventListener('click',()=>uiClickSfx('go'));
      const nx=document.getElementById('nxtBtn'); if(nx) nx.addEventListener('click',()=>uiClickSfx('tap'));
    };

    // Fallback (legacy base64) if something fails
    horseImg = HORSE_IMAGES[1] || null;
    if (!horseImg) {
      const img = new Image();
      // Attach handlers BEFORE setting src to avoid missing a fast-load event.
      img.onload = () => afterHorseReady();
      img.onerror = () => afterHorseReady();
      img.src = HORSE_SRC;
      horseImg = img;
      // Safety: if the browser doesn't fire events for some reason, still init.
      setTimeout(() => afterHorseReady(), 250);
      return;
    }

    if (horseImg && !horseImg.complete) {
      horseImg.onload = () => afterHorseReady();
      horseImg.onerror = () => afterHorseReady();
      // Safety: avoid getting stuck on missing events
      setTimeout(() => afterHorseReady(), 250);
    } else {
      // Kick on next frame to keep load handlers consistent
      requestAnimationFrame(() => afterHorseReady());
    }
  });

  window.addEventListener('resize', () => { buildScene(); initSky(); });
});

function randomizeOddsAndWinPct() {
  // More varied odds: some races are tight fields, some are skewed, some are wild.
  // We sample strengths from a simple Dirichlet-like process, then convert to odds.
  const u = Math.random();
  const regime = (u < 0.45) ? 'tight' : (u < 0.82 ? 'mixed' : 'wild');
  const minO = 1.1;
  const maxO = (regime === 'wild') ? 10.5 : (regime === 'mixed' ? 8.2 : 4.2);

  const alpha = (regime === 'tight') ? 6.0 : (regime === 'mixed' ? 2.2 : 0.85);
  const gamma1 = () => {
    // Gamma(k=1) = -ln(U). This is enough for variability; scale by alpha.
    const r = Math.random();
    return -Math.log(Math.max(1e-9, r));
  };

  // draw raw strengths
  const raw = HORSES.map(() => {
    const a = alpha;
    // Approximate Gamma(alpha) by summing exponentials when alpha>1, else bias smaller.
    if (a >= 1.2) {
      const n = Math.max(1, Math.floor(a));
      let s = 0;
      for (let i=0;i<n;i++) s += gamma1();
      s += (a - n) * gamma1();
      return s;
    }
    return Math.pow(gamma1(), a);
  });
  const sum = raw.reduce((a,b)=>a+b,0) || 1;
  const p = raw.map(v => v / sum);

  // house margin factor (slight) so odds are not too generous
  const margin = (regime === 'tight') ? 0.93 : (regime === 'mixed' ? 0.90 : 0.88);

  HORSES.forEach((h,i)=>{
    const pi = Math.max(0.01, Math.min(0.85, p[i]));
    const fair = 1 / pi;
    const o = fair / margin;
    // Add a small per-horse noise so duplicates don't happen
    const noisy = o * (0.94 + Math.random()*0.12);
    h.odds = Math.round(Math.max(minO, Math.min(maxO, noisy))*10)/10;
  });

  // Recompute implied win% from odds
  const w = HORSES.map(h=>1/Math.max(1.01,h.odds));
  const t = w.reduce((a,b)=>a+b,0) || 1;
  HORSES.forEach((h,i)=>{ h.wp = (w[i]/t)*100; });
  // Update cards UI
  HORSES.forEach(h=>{
    const card = document.getElementById(`hc-${h.id}`);
    if (!card) return;
    const oddsEl = card.querySelector('.codds');
    if (oddsEl) oddsEl.textContent = `x${h.odds} · ${Math.round(h.wp)}%`;
  });
  // If a horse is currently selected, keep button in sync
  if (selId) {
    const btn=document.getElementById('goBtn');
    const h=HORSES[selId-1];
    if (btn && h) btn.textContent = `🏇 START — ${h.name}  ·  Odds x${h.odds}  ·  ${Math.round(h.wp)}%`;
  }
}

function buildScene() {
  const {scW, scH, trackH, laneH, gateX, startX} = getLayout();

  // Lane dividers
  const lc = document.getElementById('laneC');
  lc.width=scW; lc.height=trackH;
  lc.style.cssText=`position:absolute;left:0;right:0;bottom:var(--trackBottom);width:100%;height:var(--trackHeight);z-index:4;pointer-events:none;`;
  const ctx=lc.getContext('2d'); ctx.clearRect(0,0,scW,trackH);
  for (let i=1;i<N;i++) {
    ctx.save(); ctx.setLineDash([18,18]);
    ctx.beginPath(); ctx.moveTo(0,i*laneH); ctx.lineTo(scW,i*laneH);
    ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=2; ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
  }
  // Track depth edges
  const eg = ctx.createLinearGradient(0,0,0,trackH);
  eg.addColorStop(0,'rgba(0,0,0,0.28)');
  eg.addColorStop(0.12,'rgba(0,0,0,0.02)');
  eg.addColorStop(0.88,'rgba(0,0,0,0.05)');
  eg.addColorStop(1,'rgba(0,0,0,0.30)');
  ctx.fillStyle = eg;
  ctx.fillRect(0,0,scW,trackH);

  // Gate
  const gw = document.getElementById('gateWrap');
  gw.style.left = gateX+'px';
  gw.style.width = '38px';
  gw.querySelectorAll('.gdoor').forEach(e=>e.remove());
  const gwH = gw.offsetHeight || (trackH+20);
  for (let i=0;i<N;i++) {
    const door=document.createElement('div'); door.className='gdoor'; door.id=`gd-${i}`;
    door.style.top=(i*(gwH/N))+'px'; door.style.height=((gwH/N)-2)+'px';
    const num=document.createElement('span'); num.className='gnum'; num.textContent=(N-i)+'';
    door.appendChild(num); gw.appendChild(door);
  }

  // Horses
  buildHorses(laneH, startX);
}

function buildHorses(laneH, startX) {
  const hcont = document.getElementById('hcont');
  hcont.innerHTML='';

  // IMAGE: 796x560, aspect 1.4214
  // Full transparent sprite with premium motion effects.
  const ASPECT = 796/560;
  const dispHBase = Math.min(laneH * 1.18, 320);
  const dispWBase = Math.round(dispHBase * ASPECT);

  HORSES.forEach((h, i) => {
    const dispH = dispHBase;
    const dispW = dispWBase;
    const bodyDispH = dispH;
    const legH = 0;
    const canvW = dispW + 20;
    const canvH = bodyDispH + 8;

    const lane=document.createElement('div'); lane.className='hlane'; lane.id=`hl-${h.id}`;
    lane.style.cssText=`position:absolute;left:0;right:0;height:${laneH}px;bottom:${i*laneH}px;`;

    const unit=document.createElement('div'); unit.className='hunit'; unit.id=`hu-${h.id}`;
    // Inset slightly so the top lane horse never clips outside the track
    const unitInset = Math.round(laneH * 0.08);
    unit.style.cssText=`position:absolute;left:${startX}px;bottom:${unitInset}px;`;

    // Info above horse
    const info=document.createElement('div'); info.className='hinfo';
    const badge=document.createElement('div'); badge.className='hbadge'; badge.id=`hb-${h.id}`;
    badge.innerHTML=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${h.color};margin-right:3px;vertical-align:middle"></span>#${h.id} ${h.short}`;
    info.appendChild(badge);

    // Canvas
    const canvas=document.createElement('canvas'); canvas.className='hcanvas'; canvas.id=`hcv-${h.id}`;
    canvas.width=canvW; canvas.height=canvH;
    canvas.style.cssText=`width:${canvW}px;height:${canvH}px;display:block;`;
    canvas.style.filter=`drop-shadow(2px 3px 6px rgba(0,0,0,0.65))`;

    HC[h.id] = {
      canvas, ctx: canvas.getContext('2d'),
      dispW, dispH, bodyDispH, legH, canvW, canvH,
      bodyFrac: 1,
      legPh: i * (Math.PI*2/N),
      vel: 0, racing: false, burst: false, hue: h.hue,
      dust: []
    };

    const wrap=document.createElement('div'); wrap.style.position='relative';
    wrap.appendChild(canvas);
    unit.appendChild(info); unit.appendChild(wrap);
    lane.appendChild(unit); hcont.appendChild(lane);
  });
}

// HORSE DRAW
// ═══════════════════════════════════════
function drawHorse(id) {
  const hd = HC[id]; if (!hd) return;
  const img = HORSE_IMAGES[id] || horseImg;
  if (!img) return;
  const {canvas, ctx, dispW, dispH, bodyDispH, legH, canvW, canvH, bodyFrac, legPh, vel, racing, burst, dust} = hd;

  ctx.clearRect(0, 0, canvW, canvH);

  ctx.imageSmoothingEnabled = true;
  try{ ctx.imageSmoothingQuality = 'high'; }catch(e){}

  const srcH = img.naturalHeight || img.height;
  const srcW = img.naturalWidth || img.width;
  const spd = Math.max(0.2, Math.min(2.8, vel / 0.055));
  const bob = racing ? Math.sin(legPh*2.0) * (1.8 + spd*1.0) : 0;
  const tilt = racing ? Math.sin(legPh*1.05) * (0.02 + spd*0.008) : 0;

  // Ground shadow (sells motion a lot)
  ctx.save();
  const shAlpha = racing ? Math.min(0.38, 0.14 + spd*0.08) : 0.12;
  const shW = dispW * (racing ? (0.34 + Math.min(0.18, spd*0.04)) : 0.32);
  const shH = 10 + (racing ? (6 + Math.min(6, spd*2.2)) : 3);
  const shX = dispW * 0.52;
  const shY = dispH - 10;
  const gsh = ctx.createRadialGradient(shX, shY, 2, shX, shY, shW*0.62);
  gsh.addColorStop(0, `rgba(0,0,0,${shAlpha})`);
  gsh.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gsh;
  ctx.beginPath();
  ctx.ellipse(shX, shY, shW*0.55, shH*0.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Dust particles (draw behind horse)
  if (dust && dust.length) {
    ctx.save();
    dust.forEach(p => {
      ctx.globalAlpha = p.a;
      ctx.fillStyle = p.c;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r*1.25, p.r, 0, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  // Motion blur at speed: draw a few faint trailing copies
  ctx.save();
  ctx.translate(0, bob);
  ctx.translate(dispW*0.5, dispH*0.56);
  ctx.rotate(tilt);
  ctx.translate(-dispW*0.5, -dispH*0.56);

  if (racing && vel > 0.022) {
    const blurA = Math.min(0.18, 0.06 + spd*0.025);
    const off = Math.min(14, 6 + spd*4);
    ctx.globalAlpha = blurA;
    ctx.drawImage(img, 0, 0, srcW, srcH, -off, 0, dispW, dispH);
    ctx.globalAlpha = blurA * 0.7;
    ctx.drawImage(img, 0, 0, srcW, srcH, -off*1.8, 0, dispW, dispH);
    ctx.globalAlpha = 1;
  }

  ctx.drawImage(img, 0, 0, srcW, srcH, 0, 0, dispW, dispH);
  ctx.restore();

  // Update brightness for burst
  canvas.style.filter = `drop-shadow(2px 3px 6px rgba(0,0,0,0.65))${burst?' brightness(1.12)':''}`;

  // No overlay legs.
}

function stepDust(hd, dt) {
  if (!hd) return;
  const dust = hd.dust;
  if (!dust) return;

  // Update existing
  for (let i=dust.length-1;i>=0;i--) {
    const p=dust[i];
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= (1 - 0.0008*dt);
    p.vy += 0.00022*dt;
    p.a = Math.max(0, p.life / p.life0);
    if (p.life <= 0 || p.a <= 0.02) dust.splice(i,1);
  }

  // Spawn when racing + fast
  if (!hd.racing || hd.vel < 0.018) return;
  const spd = Math.max(0.2, Math.min(2.8, hd.vel / 0.055));
  const spawn = Math.min(3, 0.6 + spd*0.7);
  if (Math.random() > spawn*0.22) return;

  const x = hd.dispW * (0.18 + Math.random()*0.12);
  const y = hd.dispH - (8 + Math.random()*8);
  const r = 3.5 + Math.random()*5.5;
  const life0 = 240 + Math.random()*220;
  dust.push({
    x, y,
    vx: -(0.05 + spd*0.05) * (0.8+Math.random()*0.7),
    vy: -(0.02 + Math.random()*0.03),
    r,
    c: 'rgba(220,180,120,0.9)',
    a: 0.6,
    life0,
    life: life0
  });

  if (dust.length > 36) dust.splice(0, dust.length - 36);
}

function drawLegsGallop(ctx, W, attachY, ph, vel) {
  // Horse faces RIGHT in the image.
  // Front legs connect near x≈70% of W, back legs near x≈28% of W.
  // Each leg = upper segment + lower segment, like a real horse knee
  const fX = W * 0.62;
  const bX = W * 0.34;
  const aY  = attachY - 2; // attach just below body

  // Leg size proportional to body width
  const segU = W * 0.115;  // upper segment (hip→knee)
  const segL = W * 0.105;  // lower segment (knee→hoof)
  const lw   = W * 0.038;  // leg width
  const spread = W * 0.017; // lateral spread between L/R legs

  // Gallop: diagonal pairs
  // FR and BL move together (offset 0), FL and BR offset PI
  const frPh = ph;
  const blPh = ph + Math.PI * 0.55;
  const flPh = ph + Math.PI;
  const brPh = ph + Math.PI * 1.55;

  // Draw back pair first (visually behind body)
  drawOneLeg(ctx, bX - spread, aY, brPh, segU, segL, lw, false);
  drawOneLeg(ctx, bX + spread, aY, blPh, segU, segL, lw, false);
  // Then front pair
  drawOneLeg(ctx, fX - spread, aY, flPh, segU, segL, lw, true);
  drawOneLeg(ctx, fX + spread, aY, frPh, segU, segL, lw, true);
}

function drawOneLeg(ctx, ax, ay, ph, segU, segL, lw, isFront) {
  const s = Math.sin(ph), c = Math.cos(ph);
  // Upper leg swings from near-vertical
  // Base angle roughly straight down, swings ±40deg
  const baseAng = Math.PI * 0.5;       // pointing down
  const swingAng = s * 0.42;           // swing amplitude
  const upperAng = baseAng + swingAng; // angle of upper segment

  // Knee point
  const kx = ax + Math.cos(upperAng) * segU;
  const ky = ay + Math.sin(upperAng) * segU;

  // Lower leg: bends at knee. When swinging forward, knee bends back slightly.
  const bendBias = isFront ? 0.3 : 0.25;
  const lowerAng = upperAng + bendBias + Math.max(0, c) * 0.35;
  const hx = kx + Math.cos(lowerAng) * segL;
  const hy = ky + Math.sin(lowerAng) * segL;

  const hoofR = lw * 0.7;

  ctx.save();

  // Shadow offset
  ctx.strokeStyle = 'rgba(20,10,5,0.45)'; ctx.lineWidth = lw + 2.5;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(ax+1.5, ay+1.5);
  ctx.lineTo(kx+1.5, ky+1.5); ctx.lineTo(hx+1.5, hy+1.5); ctx.stroke();

  // Main leg (brown)
  ctx.strokeStyle = '#5a2e0c'; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(kx, ky); ctx.lineTo(hx, hy); ctx.stroke();

  // Highlight on upper
  ctx.strokeStyle = 'rgba(145,85,40,0.55)'; ctx.lineWidth = lw * 0.38;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(kx, ky); ctx.stroke();

  // Green sock on lower leg
  ctx.strokeStyle = '#1e9940'; ctx.lineWidth = lw * 0.88; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(hx, hy); ctx.stroke();

  // White stripe on sock
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = lw * 0.28;
  ctx.setLineDash([lw * 0.55, lw * 0.42]);
  ctx.beginPath();
  const sockMidX = kx + (hx-kx)*0.25, sockMidY = ky + (hy-ky)*0.25;
  const sockEndX = hx - Math.cos(lowerAng)*hoofR*1.1;
  const sockEndY = hy - Math.sin(lowerAng)*hoofR*1.1;
  ctx.moveTo(sockMidX, sockMidY); ctx.lineTo(sockEndX, sockEndY); ctx.stroke();
  ctx.setLineDash([]);

  // Knee joint
  ctx.fillStyle = '#3e2008';
  ctx.beginPath(); ctx.arc(kx, ky, lw * 0.55, 0, Math.PI*2); ctx.fill();
  // Knee shine
  ctx.fillStyle = 'rgba(160,90,45,0.45)';
  ctx.beginPath(); ctx.arc(kx - lw*0.18, ky - lw*0.15, lw * 0.22, 0, Math.PI*2); ctx.fill();

  // Hoof
  ctx.fillStyle = '#181818';
  ctx.beginPath(); ctx.ellipse(hx, hy + hoofR*0.4, hoofR*1.5, hoofR*0.85, 0, 0, Math.PI*2); ctx.fill();
  // Hoof shine
  ctx.fillStyle = 'rgba(90,90,90,0.45)';
  ctx.beginPath(); ctx.arc(hx - hoofR*0.4, hy, hoofR*0.5, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawLegsStand(ctx, W, attachY) {
  // Four legs straight down, slightly spread
  const fX = W * 0.70, bX = W * 0.28;
  const aY  = attachY - 3;
  const segU = W * 0.115, segL = W * 0.105;
  const lw   = W * 0.038, spread = W * 0.025;
  const hoofR = lw * 0.7;

  [[bX-spread, false],[bX+spread, false],[fX-spread, true],[fX+spread, true]].forEach(([lx, isFront]) => {
    const ky = aY + segU, hy = ky + segL;
    ctx.save();
    ctx.strokeStyle='rgba(20,10,5,0.4)'; ctx.lineWidth=lw+2.5; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(lx+1.5,aY+1.5); ctx.lineTo(lx+1.5,ky+1.5); ctx.lineTo(lx+1.5,hy+1.5); ctx.stroke();
    ctx.strokeStyle='#5a2e0c'; ctx.lineWidth=lw;
    ctx.beginPath(); ctx.moveTo(lx,aY); ctx.lineTo(lx,ky); ctx.lineTo(lx,hy); ctx.stroke();
    ctx.strokeStyle='rgba(145,85,40,0.5)'; ctx.lineWidth=lw*0.35;
    ctx.beginPath(); ctx.moveTo(lx,aY); ctx.lineTo(lx,ky); ctx.stroke();
    ctx.strokeStyle='#1e9940'; ctx.lineWidth=lw*0.88; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(lx,ky); ctx.lineTo(lx,hy); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=lw*0.27; ctx.setLineDash([lw*0.5,lw*0.4]);
    ctx.beginPath(); ctx.moveTo(lx,ky+segL*0.2); ctx.lineTo(lx,hy-hoofR); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#3e2008'; ctx.beginPath(); ctx.arc(lx,ky,lw*0.55,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#181818'; ctx.beginPath(); ctx.ellipse(lx,hy+hoofR*0.4,hoofR*1.5,hoofR*0.85,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// LEG ANIMATION LOOP
// ═══════════════════════════════════════
// IMPORTANT: legs only animate when racing=true
// When idle: draw static standing legs only once per frame (very slow drift)
let prevAnimT = 0;
function startLegAnim() {
  function tick(t) {
    const dt = Math.min(t - prevAnimT, 50); prevAnimT = t;
    HORSES.forEach(h => {
      const hd = HC[h.id]; if (!hd) return;
      if (hd.racing) {
        // Gallop speed tied to actual horse velocity
        const spd = Math.max(0.4, hd.vel / 0.065);
        hd.legPh += dt * 0.001 * (8 + spd * 9);
      }
      stepDust(hd, dt);
      // Always redraw (racing: animate, idle: static stand)
      drawHorse(h.id);
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function handleStart() {
  if (isRacing||!selId) return;
  if (betAmt>balance) { alert('Not enough chips!'); return; }
  if (_pendingRacePayment) return;
  _pendingRacePayment = true;

  try{
    const maxOdds = Math.max(...HORSES.map(h=>Number(h.odds||0)));
    const myOdds = Number(HORSES[selId-1]?.odds || 0);
    _selectedWasUnderdog = (myOdds>0 && maxOdds>0 && myOdds===maxOdds);
  }catch(e){ _selectedWasUnderdog = false; }

  // Prime/unlock race music on a user gesture (wallet + countdown breaks autoplay)
  try{
    if(!raceMusicEl){
      raceMusicEl=new Audio('carreracaballos.MP3');
      raceMusicEl.preload='auto';
      raceMusicEl.loop=true;
      raceMusicEl.volume=0.65;
    }
    raceMusicEl.volume=0.65;
    raceMusicEl.muted = true;
    const p = raceMusicEl.play();
    if(p && p.catch) p.catch(()=>{});
    _raceMusicPrimed = true;
  }catch(e){}

  const btn=document.getElementById('goBtn');
  if(btn){
    btn.disabled=true;
    btn.classList.remove('run');
    btn.textContent='💳 CONFIRM IN WALLET...';
    btn.style.opacity='0.85';
  }
  try{ window.parent.postMessage({ type:'AGW_PLAY' }, '*'); }catch(e){}
}

function _racePaymentOk(){
  if(!_pendingRacePayment) return;
  _pendingRacePayment=false;
  uiClickSfx('go');
  lockUI();
  balance-=betAmt;
  updateStats();
  doCountdown().then(()=>launchRace());
}

function _racePaymentFail(msg){
  if(!_pendingRacePayment) return;
  _pendingRacePayment=false;
  const btn=document.getElementById('goBtn');
  if(btn){
    btn.disabled=false;
    btn.style.opacity='1';
    const h=HORSES[selId-1];
    btn.textContent=h?`🏇 START — ${h.name}  ·  Odds x${h.odds}`:'🏇 START';
  }
  alert('❌ '+(msg||'Transaction failed'));
}

function ensureAudio() {
  try{
    if (audioCtx) return true;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    audioCtx = new AC();
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 0.65;
    audioMaster.connect(audioCtx.destination);
    audioOn = true;
    return true;
  } catch(e){
    return false;
  }
}

  if (!n) return;

}

function doCountdown() {
