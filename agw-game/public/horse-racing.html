// ═══════════════════════════════════════
// RACE ENGINE
// ═══════════════════════════════════════
function pickWinner() {
  const w=HORSES.map(h=>1/h.odds), t=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*t;
  for (let i=0;i<N;i++) { r-=w[i]; if(r<=0) return HORSES[i].id; }
  return HORSES[N-1].id;
}

function launchRace() {
  document.querySelectorAll('.gdoor').forEach(d=>d.classList.add('open'));
  document.getElementById('cwave').classList.add('on');
  // START leg animation for all horses
  HORSES.forEach(h=>{ if(HC[h.id]) { HC[h.id].racing=true; HC[h.id].vel=0.01; }});
  stopRaceAudio();
  startRaceAudio();
  predWinner=pickWinner(); finOrder=[]; raceStartT=performance.now(); lastT=null;
  HORSES.forEach(h=>{
    const isW=h.id===predWinner, base=0.048+(isW?0.007:0);
    const form = (Math.random()<0.14) ? 0.88 : ((Math.random()<0.18) ? 1.12 : (0.97+Math.random()*0.08));
    const slowStart = (Math.random()<0.22);
    hState[h.id]={
      pos:0, vel:base*(0.70+Math.random()*0.60),
      top:base*(1.05+Math.random()*0.46)*form, bot:base*(0.42+Math.random()*0.28)*(0.92+form*0.08),
      aggr:0.2+Math.random()*0.8, burstOn:false, bTimer:0, bDur:0, rTimer:0,
      done:false, wb:isW?1.13:1.0, delay:Math.random()*320,
      dOn:false, dTimer:0, dDur:0, dCd:600+Math.random()*1800,
      shTO:900+Math.random()*2000,
      stOn:false, stTimer:0, stDur:0, stCd:600+Math.random()*1800,
      leadT:0,
      swOn:false, swTimer:0, swDur:0, swCd:900+Math.random()*2600,
      form,
      ss: slowStart ? (1.08+Math.random()*0.75) : 0
    };
    if (hState[h.id].ss>0) hState[h.id].delay += hState[h.id].ss*240;
  });
  requestAnimationFrame(raceFrame);
}

function raceFrame(t) {
  if (!lastT) lastT=t;
  const dt=Math.min(t-lastT,50); lastT=t;
  const {startX,trackPx}=getLayout();
  const elapsed=(t-raceStartT)/1000;

  const live=HORSES.map(h=>({id:h.id,p:hState[h.id].done?2:hState[h.id].pos}));
  live.sort((a,b)=>b.p-a.p);
  const leadId=live[0]?.id;
  const packN=Math.min(4,live.length);
  const packAvg = live.slice(0,packN).reduce((a,x)=>a+x.p,0)/(packN||1);
  const packT = Math.min(0.94, packAvg + 0.008);

  HORSES.forEach(h=>{
    const s=hState[h.id]; if(s.done) return;
    if ((t-raceStartT)<s.delay) return;
    s.bTimer-=dt; s.rTimer-=dt;
    s.dCd-=dt;
    s.shTO-=dt;
    s.stCd-=dt;
    s.swCd-=dt;

    if (!s.burstOn&&s.rTimer<=0) {
      if (Math.random()<s.aggr*0.0025*dt) { s.burstOn=true; s.bDur=600+Math.random()*2000; s.bTimer=s.bDur; }
    }
    if (s.burstOn&&s.bTimer<=0) { s.burstOn=false; s.rTimer=400+Math.random()*2500; }

    // Stumble events: short slowdowns that create overtakes.
    if (!s.stOn && s.stCd<=0 && s.pos<0.96) {
      const ridx0=live.findIndex(x=>x.id===h.id);
      const isLeader0 = (h.id===leadId);
      const baseP = (isLeader0 && h.id!==predWinner) ? 0.0038 : 0.0014;
      if (Math.random() < baseP * dt) {
        s.stOn=true;
        s.stDur=260+Math.random()*420;
        s.stTimer=s.stDur;
      } else {
        s.stCd=450+Math.random()*1700;
      }
    }
    if (s.stOn) {
      s.stTimer-=dt;
      if (s.stTimer<=0) {
        s.stOn=false;
        s.stCd=700+Math.random()*2600;
      }
    }

    // Track how long a horse has been leading -> fatigue/"choke" potential
    if (h.id===leadId) s.leadT = Math.min(16000, s.leadT + dt);
    else s.leadT = Math.max(0, s.leadT - dt*0.6);

    // Second-wind surges (more likely for trailers late) to create dramatic overtakes
    if (!s.swOn && s.swCd<=0 && s.pos>0.55 && s.pos<0.97) {
      const ridx0=live.findIndex(x=>x.id===h.id);
      const late = s.pos>0.78;
      const isTrailer0 = (ridx0>=Math.floor(N*0.55));
      const p = (late ? 0.0034 : 0.0016) * (isTrailer0 ? 2.2 : 1.0) * dt;
      if (Math.random() < p) {
        s.swOn=true;
        s.swDur=620+Math.random()*1200;
        s.swTimer=s.swDur;
      } else {
        s.swCd=650+Math.random()*2000;
      }
    }
    if (s.swOn) {
      s.swTimer-=dt;
      if (s.swTimer<=0) {
        s.swOn=false;
        s.swCd=900+Math.random()*3200;
      }
    }

    if (!s.dOn && s.dCd<=0 && !s.burstOn && s.pos<0.92) {
      const ridx=live.findIndex(x=>x.id===h.id);
      const isTrailer=ridx===N-1;
      const isCatchup=(ridx>=Math.max(3,Math.floor(N*0.55)));
      const p=(isTrailer?0.0032:(isCatchup?0.0018:0.00085))*dt;
      if (Math.random()<p) {
        s.dOn=true;
        s.dDur=520+Math.random()*880;
        s.dTimer=s.dDur;
      } else {
        s.dCd=380+Math.random()*1500;
      }
    }
    if (s.dOn) {
      s.dTimer-=dt;
      if (s.dTimer<=0) {
        s.dOn=false;
        s.dCd=650+Math.random()*2400;
      }
    }

    let wb=1;
    if (h.id===predWinner) {
      // Keep winner hidden until late: surge only at the end
      if(s.pos<0.80)wb=0.995;
      else if(s.pos>=0.80&&s.pos<0.90)wb=1.03;
      else if(s.pos>=0.90&&s.pos<0.96)wb=1.15;
      else wb=1.28;
    }

    const ridx=live.findIndex(x=>x.id===h.id);
    const trailBoost=1 + (ridx/(N-1))*0.12;
    const ahead=live[Math.max(0,ridx-1)];
    const gap=(ahead && ahead.id!==h.id) ? (ahead.p - s.pos) : 1;
    const draft=(gap>0 && gap<0.065 && h.id!==leadId) ? (1.03 + (0.065-gap)*0.62) : 1;
    const drama=(s.dOn ? (1.10 + 0.11*Math.sin(s.dTimer/s.dDur*Math.PI)) : 1);
    const stumble = s.stOn ? (0.72 + 0.12*Math.sin((s.stTimer/s.stDur)*Math.PI)) : 1;
    const secondWind = s.swOn ? (1.14 + 0.36*Math.sin((s.swTimer/s.swDur)*Math.PI)) : 1;

    // Leader fatigue: the longer you lead, the more likely you slow down (except predWinner very late)
    const leadFat = (h.id===leadId && h.id!==predWinner) ? (1 - Math.min(0.26, Math.max(0,(s.leadT-1200))/7000*0.26)) : 1;

    // Periodic shakeups: boost a trailer / nerf the leader briefly to force overtakes.
    let shake=1;
    if (s.shTO<=0 && s.pos<0.94) {
      s.shTO = 1200 + Math.random()*2200;
      const isLeader = (h.id===leadId);
      const isTrailer = (ridx>=Math.floor(N*0.6));
      if (isTrailer && Math.random()<0.55) {
        s.dOn=true; s.dDur=650+Math.random()*950; s.dTimer=s.dDur;
      }
      if (isLeader && h.id!==predWinner && Math.random()<0.65) {
        s.vel *= (0.90 + Math.random()*0.04);
      }
    }

    // Pack mechanic: keep everyone closer for suspense (more overtakes)
    const pull = (packT - s.pos);
    const early = elapsed<5.2;
    const pkStr = early ? 0.35 : 1.25;
    const packPull = 1 + Math.max(-0.10, Math.min(0.14, pull)) * pkStr;
    const runaway = (elapsed<12 && (s.pos - packAvg) > (early?0.055:0.028));
    const runawayBrake = runaway ? (early?0.98:0.88) : 1;
    const trailerCatch = (packAvg - s.pos) > (early?0.090:0.055) ? (early?1.02:1.14) : 1;

    // Cap speeds to avoid an early runaway leader; open up late-race chaos
    let cap=(s.pos>0.74 && h.id!==predWinner) ? 1.01 : 1.14;
    if (elapsed<9) cap*=0.98;
    if (elapsed>11) cap*=1.03;
    if (h.id===predWinner && s.pos<0.82) cap=Math.min(cap,1.02);
    if (h.id===predWinner && ridx>2 && s.pos<0.95) cap=Math.max(cap,1.18);

    // Early spread: allow bigger gaps in the first seconds.
    if (elapsed<4.2) cap*=1.06;
    // Late chaos: allow big late speed changes.
    if (elapsed>12.2) cap*=1.06;

    const bM=s.burstOn?(1.22+0.1*Math.sin(s.bTimer/s.bDur*Math.PI)):1;
    const fat=Math.max(0.68,1-elapsed*0.017*(s.burstOn?1.5:1));
    const noise=1+(Math.random()-0.5)*0.1;
    const tv=s.top*bM*fat*noise*wb*s.wb*Math.min(cap,trailBoost*draft*drama*shake)*packPull*runawayBrake*trailerCatch*stumble*secondWind*leadFat;
    s.vel+=(Math.max(s.bot*0.85,Math.min(s.top*1.5,tv))-s.vel)*(s.burstOn?0.09:0.04);
    s.vel=Math.max(s.bot*0.8,Math.min(s.top*1.5,s.vel));
    s.pos=Math.min(1,s.pos+s.vel/1000*dt);

    if (HC[h.id]) { HC[h.id].vel=s.vel; HC[h.id].burst=s.burstOn; }

    const unit=document.getElementById(`hu-${h.id}`);
    if (unit) unit.style.left=(startX+s.pos*trackPx)+'px';

    if (Math.random()<(s.vel/0.065)*0.055*(s.burstOn?2.2:1)) spawnDust(h.id,s.burstOn);

    if (s.pos>=1) {
      s.done=true; finOrder.push(h.id);
      if(unit)unit.style.left=(startX+trackPx)+'px';
      if (HC[h.id]) { HC[h.id].racing=false; HC[h.id].vel=0; }
    }
  });

  // Rankings badge accents (keep text readable; use border/glow instead of low-contrast text)
  const rank=HORSES.map(h=>({id:h.id,p:hState[h.id].done?2:hState[h.id].pos}));
  rank.sort((a,b)=>b.p-a.p);
  setMidPodium(rank, finOrder);
  ['#FFD700','#d4d4d4','#cd7f32','rgba(255,255,255,0.45)','rgba(255,255,255,0.40)','rgba(255,255,255,0.36)','rgba(255,255,255,0.32)']
    .forEach((c,i)=>{
      const b=document.getElementById(`hb-${rank[i]?.id}`);
      if(!b) return;
      b.style.color='rgba(255,255,255,0.95)';
      b.style.borderColor=c;
      b.style.boxShadow=`0 8px 18px rgba(0,0,0,0.55),0 0 18px ${c}55`;
    });

  if (finOrder.length===N||elapsed>35) {
    rank.sort((a,b)=>b.p-a.p);
    rank.forEach(r=>{ if(!finOrder.includes(r.id)) finOrder.push(r.id); });
    lastT=null; onRaceEnd(); return;
  }
  requestAnimationFrame(raceFrame);
}

// ═══════════════════════════════════════
// DUST
// ═══════════════════════════════════════
function spawnDust(id, burst) {
  const unit=document.getElementById(`hu-${id}`); if(!unit) return;
  const rect=unit.getBoundingClientRect(); const n=burst?4:2;
  for (let i=0;i<n;i++) {
    const d=document.createElement('div'); const sz=burst?10+Math.random()*12:6+Math.random()*9;
    const rr=155+Math.random()*45|0, gg=100+Math.random()*35|0, bb=38+Math.random()*25|0;
    const aa=(burst?0.62:0.45);
    d.style.cssText=`position:fixed;width:${sz}px;height:${sz}px;border-radius:50%;
      background:radial-gradient(circle, rgba(${rr},${gg},${bb},${aa}) 0%, rgba(${rr},${gg},${bb},${aa*0.55}) 55%, rgba(${rr},${gg},${bb},0) 100%);
      left:${rect.left+3+Math.random()*16}px;top:${rect.bottom-12+Math.random()*14}px;
      pointer-events:none;z-index:50;filter:blur(${0.2+Math.random()*0.9}px);
      animation:dustRise ${0.75+Math.random()*0.75}s ease-out forwards;`;
    document.body.appendChild(d); setTimeout(()=>d.remove(),1700);
  }
}

// ═══════════════════════════════════════
// RACE END
// ═══════════════════════════════════════
function onRaceEnd() {
  document.getElementById('cwave').classList.remove('on');
  HORSES.forEach(h=>{ if(HC[h.id]){HC[h.id].racing=false;HC[h.id].vel=0;} });
  stopRaceAudio();
  const fr=finOrder.slice(0,3);
  const rk=HORSES.map(h=>({id:h.id,p:hState[h.id]?.done?2:hState[h.id]?.pos||0}));
  rk.sort((a,b)=>b.p-a.p);
  setMidPodium(rk, fr);
  const sc=document.getElementById('scene'); sc.classList.add('shk'); setTimeout(()=>sc.classList.remove('shk'),520);
  const winner=finOrder[0], won=winner===selId;
  const myP=finOrder.indexOf(selId)+1;
  const pts=awardDerbyPoints(myP);

  incMission('race_count', 1);
  const isPodium = (myP===1 || myP===2 || myP===3);
  bumpPodiumStreak(isPodium);
  if (won && _selectedWasUnderdog) {
    incMission('underdog_win', 1);
  }
  let payout=0;
  if(won){
    payout=Math.floor(betAmt*HORSES[selId-1].odds);
  } else if (myP===2) {
    payout=Math.floor(betAmt*0.50);
  } else if (myP===3) {
    payout=Math.floor(betAmt*0.25);
  }
  if (payout>0) balance+=payout;
  if(won){wins++;launchConfetti();}else losses++;
  raceNum++; updateStats(); addHistory(won,payout,winner);
  setTimeout(()=>showResult(won,payout,pts,myP),900);
}

function showResult(won,payout,pts,myP) {
  const box=document.getElementById('rbox'); box.className=`rbox ${won?'win':'loss'}`;
  const wName = HORSES[finOrder[0]-1]?.name || 'WINNER';
  document.getElementById('rtit').textContent=won?`🏆 YOU WIN!`:`💀 YOU LOSE`;
  document.getElementById('rpod').innerHTML=finOrder.slice(0,3).map((id,i)=>{
    const h=HORSES[id-1];
    return `<div class="pitem"><div class="ppos ${['g','s','b'][i]}">${['🥇 1st','🥈 2nd','🥉 3rd'][i]}</div>
      <div class="pdot" style="background:${h.color};box-shadow:0 0 9px ${h.color}88"></div>
      <div class="pname">${h.name}</div></div>`;
  }).join('');
  const ptsTxt = (Number(pts||0)>0) ? ` · Points +${Number(pts||0).toLocaleString()}` : '';
  if(won){
    document.getElementById('rpay').innerHTML=`+${payout.toLocaleString()} ${coinHTML('coin')}`;
    document.getElementById('rsub').textContent=`Winner: ${wName} · Bet ${betAmt} · Odds x${HORSES[selId-1].odds} · Payout +${payout}${ptsTxt}`;
  } else if (payout>0) {
    document.getElementById('rpay').innerHTML=`+${payout.toLocaleString()} ${coinHTML('coin')}`;
    document.getElementById('rsub').textContent=`Winner: ${wName} · "${HORSES[selId-1].name}" finished #${myP} · Place payout +${payout}${ptsTxt}`;
  } else {
    document.getElementById('rpay').innerHTML=`-${betAmt.toLocaleString()} ${coinHTML('coin')}`;
    document.getElementById('rsub').textContent=`Winner: ${wName} · "${HORSES[selId-1].name}" finished #${myP}${ptsTxt}`;
  }
  document.getElementById('resBanner').classList.add('on');
}

function nextRace() {
  document.getElementById('resBanner').classList.remove('on');
  document.querySelectorAll('.gdoor').forEach(d=>d.classList.remove('open'));
  stopRaceAudio();
  setMidPodium([], []);
  _pendingRacePayment = false;
  const {startX}=getLayout();
  HORSES.forEach(h=>{
    const u=document.getElementById(`hu-${h.id}`); if(u)u.style.left=startX+'px';
    const b=document.getElementById(`hb-${h.id}`); if(b)b.style.color='';
    const sl=document.getElementById(`sl-${h.id}`); if(sl)sl.classList.remove('on');
    if(HC[h.id]){HC[h.id].racing=false;HC[h.id].vel=0;}
  });
  isRacing=false; selId=null;
  document.querySelectorAll('.hcard').forEach(c=>c.classList.remove('locked','chosen'));
  document.querySelectorAll('.abtn').forEach(b=>b.disabled=false);
  const btn=document.getElementById('goBtn'); btn.disabled=true; btn.classList.remove('run');
  btn.textContent='🏇 PICK A HORSE TO BET';
  randomizeOddsAndWinPct();
  if(balance<=0){
    alert('Out of chips! Daily bankroll resets at 00:00 UTC');
    updateStats();
  }
}

function updateStats(){
  resetChipsIfNeeded();
  document.getElementById('balV').textContent=balance.toLocaleString();
  renderDaily();
  document.getElementById('wV').textContent=wins;
  document.getElementById('lV').textContent=losses;
  document.getElementById('rV').textContent=raceNum;
  try{ localStorage.setItem('DERBY_CHIPS_BAL',String(balance)); }catch(e){}
}

function betFactor(amt){
  const a=Number(amt||0);
  if(a>=500) return 1.50;
  if(a>=250) return 1.32;
  if(a>=100) return 1.18;
  if(a>=50) return 1.10;
  return 1.00;
}

function awardDerbyPoints(place){
  if(!selId) return 0;
  if(place>3) return 0;
  const h=HORSES[selId-1];
  const odds=Number(h?.odds||1);
  const base = place===1 ? 100 : (place===2 ? 35 : 20);
  const pts = Math.max(0, Math.round(base * odds * betFactor(betAmt)));
  if(pts<=0) return 0;
  resetDailyIfNeeded();
  dailyPts += pts;
  lifePts += pts;
  try{
    localStorage.setItem('DERBY_DAILY_KEY',dailyKey);
    localStorage.setItem('DERBY_DAILY_POINTS',String(dailyPts));
    localStorage.setItem('DERBY_LIFE_POINTS',String(lifePts));
  }catch(e){}
  renderDaily();
  // Add to weekly leaderboard (server aggregates weekly key Friday 00:00 UTC)
  try{ window.parent.postMessage({ type:'DERBY_WEEKLY_POINTS', points: pts }, '*'); }catch(e){}
  return pts;
}
function addHistory(won,payout,wid){
  const c=document.getElementById('histItems'); if(histChips.length===0)c.innerHTML='';
  const ch=document.createElement('span'); ch.className=`hchip ${won?'w':'l'}`;
  const wh=HORSES[wid-1];
  const myP=finOrder.indexOf(selId)+1;
  const wMeta=`x${wh.odds} · ${Math.round(wh.wp)}%`;
  const cash=won?`+${payout.toLocaleString()}`:`-${betAmt.toLocaleString()}`;
  const place=won?`WIN`:`#${myP}`;
  ch.innerHTML=`<span class="hmain">#${raceNum-1} ${wh.short}</span><span class="hmeta">${wMeta} · ${place} · ${cash} ${coinHTML('coin')}</span>`;
  c.insertBefore(ch,c.firstChild); histChips.push(ch);
  if(histChips.length>12)histChips.shift().remove();
}
function launchConfetti(){
  if(hasAbstractLogo && abstractLogoSrc){
    for(let i=0;i<95;i++){
      setTimeout(()=>{
        const el=document.createElement('img'); el.className='cfcoin';
        el.src=abstractLogoSrc;
        const sz=14+Math.random()*18;
        const drift=(-90+Math.random()*180).toFixed(1)+'px';
        const dx=(-40+Math.random()*80).toFixed(1)+'px';
        const rx=(900+Math.random()*1400).toFixed(0)+'deg';
        const ry=(1100+Math.random()*1800).toFixed(0)+'deg';
        const rz0=(Math.random()*360).toFixed(0)+'deg';
        const rz1=(720+Math.random()*1400).toFixed(0)+'deg';
        el.style.cssText=`left:${2+Math.random()*96}vw;top:-18px;width:${sz}px;height:${sz}px;
          animation-duration:${2.3+Math.random()*2.9}s;animation-delay:${Math.random()*0.55}s;
          filter:drop-shadow(0 0 14px rgba(255,215,0,0.20)) drop-shadow(0 10px 18px rgba(0,0,0,0.55));
          backface-visibility:hidden;`;
        el.style.animationName='cfCoinFall';
        el.style.animationTimingFunction='cubic-bezier(.12,.62,.22,1)';
        el.style.animationFillMode='forwards';
        el.style.animationIterationCount='1';
        el.style.setProperty('--drift', drift);
        el.style.setProperty('--dx', dx);
        el.style.setProperty('--rx', rx);
        el.style.setProperty('--ry', ry);
        el.style.setProperty('--rz0', rz0);
        el.style.setProperty('--rz1', rz1);
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5200);
      },i*20);
    }
    return;
  }
  const cols=['#FFD700','#FFA500','#00e87a','#00b4ff','#ff2d55','#9333ea','#ec4899','#fff'];
  for(let i=0;i<110;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='cf'; const sz=5+Math.random()*11;
      el.style.cssText=`left:${3+Math.random()*94}vw;top:-10px;width:${sz}px;height:${Math.random()>.4?sz:sz*2.5}px;
        background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.4?'50%':'2px'};
        animation-duration:${1.8+Math.random()*2.5}s;animation-delay:${Math.random()*0.8}s;`;
      document.body.appendChild(el); setTimeout(()=>el.remove(),4500);
    },i*18);
  }
}
</script>
